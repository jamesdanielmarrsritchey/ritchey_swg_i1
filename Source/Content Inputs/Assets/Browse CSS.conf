Name: Browse CSS
Description: This contains content for the the file "/www/public/assets/browse.css".
Destination: /assets/browse.css
Content:
"
/* Heading */
.headings_1 {
	display: none;
}

/* Entries */
.item_entry_holder {
	border-width: 3px;
	border-color: #E6DFDF;
	border-style: dotted;
	padding: 15px;
	margin-top: 15px;
	border-radius: 5px;
}
.item_entry_name {
	font-weight: bold;
	font-size: 26px;
}
.item_entry_date {

}
.item_entry_thumbnail {
	margin-top: 5px;
}
.item_entry_thumbnail_thumbnail {
	min-width: 300px;
	max-width: 300px;
}
.item_entry_icon {
	margin-right: 3px;
	display: inline-block;
}
.item_entry_icon_icon {
	max-width: 36px;
	min-width: 36px;
	display: inline-block;
}
.item_entry_type {
	margin-right: 3px;
	display: inline-block;
	vertical-align: top;
	line-height: 36px;
}
.item_entry_status {
	color: #000000;
	border-left-style: solid;
	border-left-width: 6px;
	border-left-color: #666666;
	padding: 3px;
}
.item_entry_status_exists {
	color: #0B8223;
	border-left-style: solid;
	border-left-width: 6px;
	border-left-color: #0B8223;
	padding: 3px;
}
.item_entry_status_removed {
	color: #820B0B;
	border-left-style: solid;
	border-left-width: 6px;
	border-left-color: #820B0B;
	padding: 3px;
}
.item_entry_overview {
	background-color: #F0F0F0;
	margin-top: 15px;
	padding: 5px;
	border-radius: 5px;
}
.item_entry_destination {

}
.item_entry_destination_link {

}
.item_entry_kmt {
	max-width: 300px;
	min-wdith: 300px;
	margin-top: 2px;
	margin-bottom: 2px;
	border-width: 3px;
	border-style: solid;
	border-color: #000000;
	background-color: #FFFFFF;
	min-height: 16px;
}
.item_entry_kmt_loading_bar_fill_red {
	background-color: #DF3434;
}
.item_entry_kmt_loading_bar_fill_orange {
	background-color: #DF7C34;
}
.item_entry_kmt_loading_bar_fill_yellow {
	background-color: #DADF34;
}
.item_entry_kmt_loading_bar_fill_green {
	background-color: #34DF56;
}
.item_entry_kmt_loading_bar_fill {
	display: inline-block;
}

/* Search Controls */
.search_control_text {
	min-width: 100%;
	max-width: 100%;
	font-size: 16px;
	vertical-align: middle;
	padding: 2px;
	padding-right: 0px;
	margin: 0px;
}

.search_control_button_link {
	border-color: #125da2;
	color: #125da2;
	margin-top: 5px;
}

.search_control_button_link:link {
	text-align: center;
	text-decoration: none;
	border-width: 1px;
	border-style: solid;
	padding-top: 10px;
	padding-bottom: 10px;
	min-width: 100%;
	/* min-width: calc(100% - 10px);
	max-width: calc(100% - 10px); */
	display: inline-block;
	/* background-color: #F5F5DC; */
	background-color: #cfe7fd;
	/* color: #111111; */
	color: #125da2;
	margin-bottom: 5px;
	border-radius: 5px;
}
@media only screen and (orientation: landscape) {
	.search_control_button_link:link {
		min-width: unset;
		padding-left: 10px;
		padding-right: 10px;
		margin-bottom: 5px;
		/* color: #111111; */
		color: #125da2;
	}
}
.search_control_button_link:visited {
	text-decoration: none;
	/* color: #111111; */
	color: #125da2;
}
.search_control_button_link:hover {
	text-decoration: none;
	/* color: #666666; */
	color: #81a4c4;
	border-color: #81a4c4;
}
.search_control_button_link:active {
	text-decoration: none;
	/* color: #111111; */
	color: #125da2;
}

/* Browse Controls */
#browse_controls_holder {

}
.browse_control_button {
	display: inline-block;
}
.browse_control_button_link {
	border-style: solid;
	border-color: #eadae3;
	border-width: 4px;
	border-top-width: 0px;
	color: #d9c6d1;
	font-size: 16px;
	font-weight: bold;
	padding: 10px;
	padding-left: 20px;
	padding-right: 20px;
	display: inline-block;
	margin-right: 5px;
}

.browse_control_button_link:link {
	color: #d9c6d1;
	border-color: #eadae3;
	font-weight: bold;
}
.browse_control_button_link:visited {
	color: #d9c6d1;
	border-color: #eadae3;
	font-weight: bold;
}
.browse_control_button_link:hover {
	color: #d0b4c4;
	border-color: #d0b4c4;
	font-weight: bold;
	background-color: #f4ebf0;
}
.browse_control_button_link:active {
	color: #d9c6d1;
	border-color: #eadae3;
	font-weight: bold;
}

.browse_control_button_link_current:link {
	color: #d0b4c4;
	border-color: #d0b4c4;
	font-weight: bold;
	background-color: #f4ebf0;
}
.browse_control_button_link_current:visited {
	color: #d0b4c4;
	border-color: #d0b4c4;
	font-weight: bold;
	background-color: #f4ebf0;
}
.browse_control_button_link_current:hover {
	color: #d0b4c4;
	border-color: #d0b4c4;
	font-weight: bold;
	background-color: #f4ebf0;
}
.browse_control_button_link_current:active {
	color: #d0b4c4;
	border-color: #d0b4c4;
	font-weight: bold;
	background-color: #f4ebf0;
}

/* Prev Next Controls */
#prev_next_controls_holder {
	min-width: 100%;
	max-width: 100%;
	font-size: 16px;
	vertical-align: middle;
	padding: 2px;
	padding-right: 0px;
	margin: 0px;
	margin-bottom: 5px;
	margin-top: 15px;
}
.prev_next_control_button {
	display: block;
}
@media only screen and (orientation: landscape) {
	.prev_next_control_button {
		display: inline-block;
	}
}

.prev_next_control_button_link {
	border-color: #125da2;
	color: #125da2;
}

.prev_next_control_button_link:link {
	text-align: center;
	text-decoration: none;
	border-width: 1px;
	border-style: solid;
	padding-top: 10px;
	padding-bottom: 10px;
	min-width: 100%;
	/* min-width: calc(100% - 10px);
	max-width: calc(100% - 10px); */
	display: inline-block;
	/* background-color: #F5F5DC; */
	background-color: #cfe7fd;
	/* color: #111111; */
	color: #125da2;
	margin-bottom: 5px;
	border-radius: 5px;
}
@media only screen and (orientation: landscape) {
	.prev_next_control_button_link:link {
		min-width: unset;
		padding-left: 10px;
		padding-right: 10px;
		margin-bottom: 5px;
		/* color: #111111; */
		color: #125da2;
	}
}
.prev_next_control_button_link:visited {
	text-decoration: none;
	/* color: #111111; */
	color: #125da2;
}
.prev_next_control_button_link:hover {
	text-decoration: none;
	/* color: #666666; */
	color: #81a4c4;
	border-color: #81a4c4;
}
.prev_next_control_button_link:active {
	text-decoration: none;
	/* color: #111111; */
	color: #125da2;
}
.hidden {
	display: none;
}	
"