Name: Operation Type
Description: States the type of operation the website is (e.g., privately operated, registered business, registered non-profit, governmental organization, etc). The default value is "Privately Operated". A value of "" disables features that use this information. Supported values are: "Privately Operated", "Registered Business", "Registered Non-Profit", "Governmental Organization", "Custom". A value of "Custom" activates the Custom Operation Type content input.
Content: Privately Operated