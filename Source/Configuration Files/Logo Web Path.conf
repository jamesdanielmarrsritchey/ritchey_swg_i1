Name: Logo Web Path
Description: This indicates the image file to use for the logo relative to the site address (e.g., "/assets/logo.jpg"). The default value is "/assets/Logo v3 - 400x400.jpg". If bio heading is enabled, you may prefer to use a photo in the bio, and an icon of your initials for the site logo. The default logo contains the letter "S" which stands for self-hosted. A value of "" disables the logo.
Content: /assets/Logo v3 - 400x400.jpg